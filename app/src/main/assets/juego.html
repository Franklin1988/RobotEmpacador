<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Robot Programador Kids</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    :root {
      --primary: #FF9800;
      --secondary: #2196F3;
      --success: #4CAF50;
      --warning: #FFC107;
      --bg: #E0F7FA;
      --text: #37474F;
    }

    body {
      font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
      background-color: var(--bg);
      margin: 0; padding: 5px; color: var(--text);
      user-select: none; touch-action: manipulation;
      overflow: hidden; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: background-color 0.3s;
    }

    #main-menu, #records-screen, #level-selector-screen {
      background: white; padding: 25px 20px; border-radius: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 95%; max-width: 350px;
    }

    .menu-btn {
      width: 100%; padding: 15px; margin: 8px 0; font-size: 18px; font-weight: bold;
      border: none; border-radius: 15px; cursor: pointer; color: white;
    }
    .btn-basic { background: var(--secondary); box-shadow: 0 6px 0 #1565C0; }
    .btn-math { background: #E91E63; box-shadow: 0 6px 0 #AD1457; }
    .btn-records { background: var(--warning); box-shadow: 0 6px 0 #F57C00; color: #5D4037; }

    #game-screen, #math-game-screen {
      display: none; width: 100%; max-width: 450px; flex-direction: column; gap: 5px; align-items: center;
    }

    #header-info {
      display: flex; justify-content: space-between; align-items: center;
      background: white; padding: 8px 12px; border-radius: 12px;
      box-shadow: 0 4px 0 rgba(0,0,0,0.05); width: 98%;
    }

    .level-info-container { text-align: left; }
    .level-indicator { font-weight: bold; color: var(--primary); font-size: 14px; display: block; }
    .best-indicator { font-size: 10px; color: #78909C; }

    .timer-container {
      font-size: 20px; font-weight: bold; color: var(--secondary);
      background: #E3F2FD; padding: 2px 12px; border-radius: 20px;
    }

    .icon-btn {
      background: #f5f5f5; border: none; border-radius: 10px;
      padding: 8px; font-size: 18px; cursor: pointer;
    }

    /* Contenedor de Phaser */
    #phaser-game-container {
      width: 98%;
      max-width: 400px;
      aspect-ratio: 1 / 1;
      margin: 5px auto;
      border-radius: 15px;
      overflow: hidden;
      background: #B0BEC5;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .controls-container {
      background: white; padding: 8px; border-radius: 18px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.08); width: 98%;
    }

    .d-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      width: 160px;
      margin: 0 auto 8px;
    }

    .cmd-btn {
      width: 50px; height: 50px; font-size: 9px; font-weight: bold;
      background: #FFF3E0; border: 2px solid var(--primary);
      border-radius: 12px; cursor: pointer; color: var(--text);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 3px 0 #E65100;
    }
    .cmd-btn span { font-size: 20px; line-height: 1; }
    .cmd-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #E65100; }
    .btn-action { background: #E1F5FE; border-color: var(--secondary); box-shadow: 0 3px 0 #0288D1; }

    .commands-list {
      width: 100%; height: 35px; overflow-y: auto;
      background: #F5F5F5; border: 2px solid #CFD8DC; border-radius: 10px;
      margin-bottom: 8px; padding: 4px; display: flex; flex-wrap: wrap; gap: 4px;
    }

    .action-btn {
      width: 100%; font-size: 18px; padding: 8px; cursor: pointer;
      border: none; border-radius: 12px; font-weight: bold;
      box-shadow: 0 4px 0 rgba(0,0,0,0.2); color: white;
    }

    .btn-run { background-color: var(--success); box-shadow: 0 4px 0 #2E7D32; }
    .btn-next { background-color: var(--secondary); box-shadow: 0 4px 0 #1565C0; display: none; }

    .message-area {
      font-size: 14px; font-weight: bold; padding: 5px;
      border-radius: 10px; min-height: 40px; text-align: center;
      display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%;
    }

    .credits { font-size: 10px; color: #78909C; margin-top: 10px; font-style: italic; text-align: center; }
    #victory-screen { display: none; padding: 20px; flex-direction: column; justify-content: center; align-items: center; height: 100%; text-align: center; }
  </style>
</head>
<body>

<div id="main-menu">
  <h1 style="color: var(--secondary); margin-top: 0;">🤖 Robot Kids</h1>
  <p>¡Hola Isaac! ¿A qué jugamos hoy?</p>
  <button class="menu-btn btn-basic" onclick="startMode('basic')">📦 Modo Cajas<br><small>Recoger y dejar</small></button>
  <button class="menu-btn btn-math" onclick="startMode('math')">🔢 Modo Sumas<br><small>¡Aprende a sumar!</small></button>
  <button class="menu-btn btn-records" onclick="showRecords()">🏆 Mejores Tiempos</button>
  <div class="credits">Creada por Franklin Aguirre, padre de Isaac</div>
</div>

<div id="records-screen" style="display:none;">
    <h2 style="color:var(--primary); margin-top:0;">🏆 Mejores Tiempos</h2>
    <div style="height: 250px; overflow-y: auto;">
        <table class="records-table" id="records-list"></table>
    </div>
    <button class="action-btn" style="background:var(--secondary); margin-top:15px;" onclick="goToMenu()">🏠 Volver</button>
</div>

<div id="game-screen">
  <div id="header-info">
    <button class="icon-btn" onclick="goToMenu()">🏠</button>
    <div class="level-info-container">
        <span id="level-indicator" class="level-indicator">Nivel 1</span>
    </div>
    <div class="timer-container">⏱️ <span id="timer">0.0s</span></div>
    <button class="icon-btn" onclick="restartFullGame()">🔄</button>
  </div>

  <div id="phaser-game-container"></div>

  <div class="controls-container">
    <div class="d-pad">
      <div></div>
      <button class="cmd-btn" onclick="addCmd('ARRIBA', '⬆️')"><span>⬆️</span>Subir</button>
      <div></div>
      <button class="cmd-btn" onclick="addCmd('IZQUIERDA', '⬅️')"><span>⬅️</span>Izq</button>
      <button class="cmd-btn btn-action" onclick="addCmd('TOMAR', '🖐️')"><span>🖐️</span>Tomar</button>
      <button class="cmd-btn" onclick="addCmd('DERECHA', '➡️')"><span>➡️</span>Der</button>
      <button class="cmd-btn btn-action" style="background:#FFF9C4;" onclick="resetLevelCommands()"><span>🗑️</span></button>
      <button class="cmd-btn" onclick="addCmd('ABAJO', '⬇️')"><span>⬇️</span>Bajar</button>
      <button class="cmd-btn btn-action" onclick="addCmd('DEJAR', '📦')"><span>📦</span>Dejar</button>
    </div>
    <div id="commands-list" class="commands-list"></div>
    <button class="action-btn btn-run" id="runButton" onclick="runCode()">▶ ¡EJECUTAR!</button>
    <button class="action-btn btn-next" id="nextLevelBtn" onclick="nextLevel()">🌟 SIGUIENTE 🌟</button>
  </div>
  <div id="message" class="message-area"></div>
</div>

<div id="victory-screen">
  <h1 style="color: var(--success)">🏆 ¡ERES UN GENIO! 🏆</h1>
  <button class="action-btn" style="background: var(--primary);" onclick="goToMenu()">🏠 Inicio</button>
</div>

<!-- CARGA DE SCRIPTS -->
<script src="script-comun.js"></script>
<script src="logica-cajas.js"></script>
<script src="logica-sumas.js"></script>
<script src="motor-ejecucion.js"></script>
<script src="config-phaser.js"></script>
<script>
  window.onload = goToMenu;
</script>
</body>
</html>
